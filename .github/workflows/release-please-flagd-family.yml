name: Release Please Flagd Family

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_ACTION_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Dump Release Please Output
        env:
          RELEASE_PLEASE_OUTPUT: ${{ toJson(steps.release.outputs) }}
        run: |
          echo "$RELEASE_PLEASE_OUTPUT"
    outputs:
      release_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}

  cargo-publish:
    needs: release-please
    runs-on: ubuntu-latest
    if: ${{ fromJSON(needs.release-please.outputs.release_created || false) }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        run: rustup update --no-self-update stable && rustup default stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2

      - name: Publish released crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          PATHS_RELEASED: ${{ needs.release-please.outputs.paths_released }}
        run: |
          publish_if_released() {
            crate_path="$1"
            if ! echo "$PATHS_RELEASED" | jq -e --arg path "$crate_path" 'fromjson | index($path)' >/dev/null; then
              return 0
            fi

            for attempt in 1 2 3 4 5; do
              if cargo publish --manifest-path "$crate_path/Cargo.toml"; then
                return 0
              fi

              if [ "$attempt" -eq 5 ]; then
                return 1
              fi

              sleep 30
            done
          }

          publish_if_released crates/flagd-evaluation-engine
          publish_if_released crates/ofrep
          publish_if_released crates/flagd
